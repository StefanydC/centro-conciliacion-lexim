server {
    listen 80;

    # Archivos HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # CSS, imágenes, JS
    location /Controller/ {
        alias /usr/share/nginx/html/../Controller/;
    }

    location /auth/ {
        proxy_pass http://api_gateway:5000/auth/;
    }

    location /health {
        proxy_pass http://api_gateway:5000/health;
    }
}