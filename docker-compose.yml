services:

  # ─── Microservicio de autenticación y tareas ───────────────────────────────
  auth-service:
    build: ./backend/auth-service
    container_name: auth_service
    environment:
      - PORT=3001
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de conciliación ────────────────────────────────────────
  conciliacion-service:
    build: ./backend/conciliacion-service
    container_name: conciliacion_service
    environment:
      - PORT=3002
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de usuarios ────────────────────────────────────────────
  usuarios-service:
    build: ./backend/usuarios-service
    container_name: usuarios_service
    environment:
      - PORT=3003
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de documentos (Google Drive) ───────────────────────────
  document-service:
    build: ./backend/document-service
    container_name: document_service
    environment:
      - PORT=3004
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/lexim-493421-e71af6001af4.json
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN}
      - DRIVE_ROOT_FOLDER_ID=${DRIVE_ROOT_FOLDER_ID}
    volumes:
      - ./backend/document-service/credentials:/app/credentials:ro
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── API Gateway ──────────────────────────────────────────────────────────
  api-gateway:
    build: ./backend/gateway
    container_name: api_gateway
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CONCILIACION_SERVICE_URL=http://conciliacion-service:3002
      - USUARIOS_SERVICE_URL=http://usuarios-service:3003
      - DOCUMENT_SERVICE_URL=http://document-service:3004
    depends_on:
      - auth-service
      - conciliacion-service
      - usuarios-service
      - document-service
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Nginx (reverse proxy + frontend estático) ────────────────────────────
  nginx:
    build: .
    container_name: nginx_lexim
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - lexim-net
    restart: unless-stopped

networks:
  lexim-net:
    driver: bridge
