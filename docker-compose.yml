services:

  # ─── Consul — Service Discovery ───────────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.18
    container_name: consul_lexim
    ports:
      - "8500:8500"
    command: "agent -dev -ui -client=0.0.0.0"
    networks:
      - lexim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Microservicio de autenticación y gestión de usuarios ────────────────────
  user-auth-service:
    build:
      context: .
      dockerfile: Backend/user-auth-service/Dockerfile
    container_name: user_auth_service
    environment:
      - PORT=3001
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost/auth/google/callback
      - CONSUL_HOST=consul_lexim
      - CONSUL_PORT=8500
      - SERVICE_NAME=user_auth_service
      - SERVICE_PORT=3001
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de agenda ──────────────────────────────────────────────────
  agenda-service:
    build:
      context: .
      dockerfile: Backend/agenda-service/Dockerfile
    container_name: agenda_service
    environment:
      - PORT=3003
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost/auth/google/callback
      - CONSUL_HOST=consul_lexim
      - CONSUL_PORT=8500
      - SERVICE_NAME=agenda_service
      - SERVICE_PORT=3003
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de conciliación ───────────────────────────────────────────
  conciliacion-service:
    build:
      context: .
      dockerfile: Backend/conciliacion-service/Dockerfile
    container_name: conciliacion_service
    environment:
      - PORT=3002
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - CONSUL_HOST=consul_lexim
      - CONSUL_PORT=8500
      - SERVICE_NAME=conciliacion_service
      - SERVICE_PORT=3002
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de documentos (Google Drive) ───────────────────────────────
  document-service:
    build:
      context: .
      dockerfile: Backend/document-service/Dockerfile
    container_name: document_service
    environment:
      - PORT=3004
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/lexim-493421-e71af6001af4.json
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN}
      - DRIVE_ROOT_FOLDER_ID=${DRIVE_ROOT_FOLDER_ID}
      - JUDICANTE_FOLDER_ID=${JUDICANTE_FOLDER_ID}
      - CONSUL_HOST=consul_lexim
      - CONSUL_PORT=8500
      - SERVICE_NAME=document_service
      - SERVICE_PORT=3004
    volumes:
      - ./backend/document-service/credentials:/app/credentials:ro
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de finanzas ────────────────────────────────────────────────
  finance-service:
    build:
      context: .
      dockerfile: Backend/finance-service/Dockerfile
    container_name: finance_service
    environment:
      - PORT=3005
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - CONSUL_HOST=consul_lexim
      - CONSUL_PORT=8500
      - SERVICE_NAME=finance_service
      - SERVICE_PORT=3005
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Microservicio de tareas ──────────────────────────────────────────────────
  task-service:
    build:
      context: .
      dockerfile: Backend/task-service/Dockerfile
    container_name: task_service
    environment:
      - PORT=3006
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - CONSUL_HOST=consul_lexim
      - CONSUL_PORT=8500
      - SERVICE_NAME=task_service
      - SERVICE_PORT=3006
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Backend/Gateway/Dockerfile
    container_name: api_gateway
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - USER_AUTH_SERVICE_URL=http://user-auth-service:3001
      - CONCILIACION_SERVICE_URL=http://conciliacion-service:3002
      - DOCUMENT_SERVICE_URL=http://document-service:3004
      - AGENDA_SERVICE_URL=http://agenda-service:3003
      - FINANCE_SERVICE_URL=http://finance-service:3005
      - TASK_SERVICE_URL=http://task-service:3006
      - CONSUL_HOST=consul_lexim
      - CONSUL_PORT=8500
    depends_on:
      consul:
        condition: service_healthy
      user-auth-service:
        condition: service_started
      conciliacion-service:
        condition: service_started
      document-service:
        condition: service_started
      agenda-service:
        condition: service_started
      finance-service:
        condition: service_started
      task-service:
        condition: service_started
    networks:
      - lexim-net
    restart: unless-stopped

  # ─── Nginx (reverse proxy + frontend estático) ────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    container_name: nginx_lexim
    environment:
      - GATEWAY_URL=api-gateway:5000
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - lexim-net
    restart: unless-stopped

networks:
  lexim-net:
    driver: bridge
