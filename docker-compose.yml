services:

  # 🗄️ MongoDB
  mongo:
    image: mongo:6.0
    container_name: mongo_lexim
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 🔐 Auth Service
  auth-service:
    build: ./auth-service
    container_name: auth_service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/auth_service
      - JWT_SECRET=replace_with_secure_secret
      - JWT_EXPIRES_IN=1h
    depends_on:
      - mongo

  # 🚀 Nginx (Frontend + Proxy)
  nginx:
    build: .
    container_name: nginx_frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service

volumes:
  mongo_data: