<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXIM — Iniciar Sesión</title>
    <link rel="icon" href="../Controller/imagenes/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Controller/styles/login.css">
</head>
<body>

    <div class="bg-canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="toast" id="toast" role="alert">
        <i class="fas fa-check-circle" id="toast-icon"></i>
        <span id="toast-msg"></span>
    </div>

    <div class="login-card">
        <div class="card-header">
            <div class="brand-icon">
                <i class="fas fa-balance-scale"></i>
            </div>
            <p class="card-eyebrow">Área privada</p>
            <h1 class="card-title">Iniciar sesión</h1>
        </div>

        <form class="login-form" id="login-form" novalidate>

            <div class="field-group">
                <label class="field-label" for="email">Correo electrónico</label>
                <div class="field-wrapper">
                    <i class="fas fa-envelope field-icon-left"></i>
                    <input class="field-input" type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Contraseña</label>
                <div class="field-wrapper">
                    <i class="fas fa-lock field-icon-left"></i>
                    <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    <button class="toggle-pass" type="button" id="toggle-pass" aria-label="Mostrar u ocultar contraseña">
                        <i class="fas fa-eye" id="toggle-icon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-label">
                    <input type="checkbox" id="remember">
                    <span class="custom-check"><i class="fas fa-check"></i></span>
                    Recordarme
                </label>
                <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
            </div>

            <button class="btn-login" type="submit" id="btn-login">
                <span class="btn-text">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Ingresar al portal
                </span>
                <span class="btn-loader"><span class="spinner"></span></span>
            </button>

            <a href="index.html" class="btn-back-home">
                <i class="fas fa-arrow-left"></i>
                Volver al inicio
            </a>

        </form>
    </div>

    <script>
        // Toggle contraseña
        const toggleBtn  = document.getElementById('toggle-pass');
        const toggleIcon = document.getElementById('toggle-icon');
        const passInput  = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const hide = passInput.type === 'password';
            passInput.type = hide ? 'text' : 'password';
            toggleIcon.className = hide ? 'fas fa-eye-slash' : 'fas fa-eye';
        });

        // Toast
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            document.getElementById('toast-icon').className = isError ? 'fas fa-times-circle' : 'fas fa-check-circle';
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3800);
        }

        // Submit
        const form    = document.getElementById('login-form');
        const btn     = document.getElementById('btn-login');
        const emailEl = document.getElementById('email');

        function markError(input) {
            input.classList.add('has-error');
            input.addEventListener('input', () => input.classList.remove('has-error'), { once: true });
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            const email = emailEl.value.trim();
            const pass  = passInput.value;
            if (!email || !pass) {
                showToast('Por favor complete todos los campos.', true);
                markError(!email ? emailEl : passInput);
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('Ingrese un correo electrónico válido.', true);
                markError(emailEl);
                return;
            }
            btn.classList.add('loading');
            btn.disabled = true;
            setTimeout(() => {
                btn.classList.remove('loading');
                btn.disabled = false;
                showToast('¡Bienvenido! Acceso verificado correctamente.');
            }, 2000);
        });

        document.addEventListener('keydown', e => { if (e.key === 'Enter') form.dispatchEvent(new Event('submit')); });
    </script>
</body>
</html>
