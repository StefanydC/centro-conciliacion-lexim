server {
    listen 80;

    location = / {
        return 302 /api/index.html;
    }

    location = /index.html {
        return 302 /api/index.html;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /api/index.html;
    }

    location /Controller/ {
        alias /usr/share/nginx/Controller/;
    }

    # ── Auth ────────────────────────────────────────
    location /api/auth/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass         http://auth-service:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;
        proxy_set_header   Content-Type     $http_content_type;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location /auth/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass         http://auth-service:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;
        proxy_set_header   Content-Type     $http_content_type;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ── Tasks ────────────────────────────────────────
    location /tasks/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass         http://auth-service:3001/tasks/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;
        proxy_set_header   Content-Type     $http_content_type;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location /api/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /api/login.html;
    }

    location /health {
        proxy_pass http://auth-service:3001/health;
    }
}