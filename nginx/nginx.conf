# ── Rate limiting: máximo 5 intentos de login por minuto por IP ───────────────
# Previene ataques de fuerza bruta al endpoint /auth/login
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

server {
    listen 80;

    # Limite de tamaño para uploads de archivos (PDFs, Word, Excel, etc.)
    client_max_body_size 200m;
    # Timeouts extendidos para uploads lentos
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;

    # Chrome consulta esta ruta de forma automática; responder vacío evita ruido en logs.
    location = /.well-known/appspecific/com.chrome.devtools.json {
        access_log off;
        log_not_found off;
        return 204;
    }

    # ─── Frontend estático ────────────────────────────────────────────────────
    # Los archivos HTML están en /usr/share/nginx/html/api/
    # (copiados por el Dockerfile desde Frontend/View)

    # Ruta raíz → servir login.html directamente (sin 302, sin cambiar URL)
    location = / {
        root /usr/share/nginx/html;
        try_files /api/login.html =404;
    }

    # Archivos estáticos del frontend (HTML, CSS dentro de /api/)
    location /api/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /api/login.html;
    }

    # Compatibilidad: si se solicita /archivo.html, servirlo desde /api/archivo.html
    location ~ ^/(?!api/)(.+\.html)$ {
        root /usr/share/nginx/html;
        try_files /api/$1 =404;
    }

    # Assets (JS, CSS, imágenes) en /Controller/
    location /Controller/ {
        alias /usr/share/nginx/Controller/;
    }

    # ─── Macro de headers CORS y proxy (repetida por bloque, Nginx no soporta macros) ──

    # ─── Rutas PÚBLICAS (sin autenticación) ──────────────────────────────────

    # Auth: login — con rate limiting para prevenir fuerza bruta
    location /auth/ {
        limit_req zone=login_zone burst=5 nodelay;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # Alias /api/auth/ → misma lógica (para compatibilidad con el frontend)
    location /api/auth/ {
        limit_req zone=login_zone burst=5 nodelay;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ─── Rutas PROTEGIDAS (judicante + administrador) ─────────────────────────
    # Nginx solo reenvía — la verificación del JWT la hace el API Gateway

    # Compatibilidad con fetch('/tasks') sin barra final
    location = /tasks {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/tasks;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location /tasks/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/tasks/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location /conciliacion/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/conciliacion/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # Compatibilidad con fetch('/documentos') sin barra final
    location = /documentos {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/documentos;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location /documentos/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/documentos/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ─── Rutas PRIVADAS (solo administrador) ──────────────────────────────────

    location /usuarios/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/usuarios/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location /admin/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api-gateway:5000/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization    $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ─── Health check ────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://api-gateway:5000/health;
    }
}
